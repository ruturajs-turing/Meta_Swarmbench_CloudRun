version = 1

[run]
name = "fireworks-real-model-smoke"
command = "python real_fireworks_eval.py"
working_dir = "/run/task"
timeout_seconds = 180
result_file = "results/summary.json"

[resources]
profile = "small"
cpu = 2
memory_gb = 4
disk_gb = 20
gpu = "none"

[image]
registry = "local"
repository = "python"
tag = "3.12-slim"
digest = "sha256:local-dev-placeholder"

[inputs]
include = [
  "task.toml",
  "real_fireworks_eval.py"
]
exclude = [
  ".git/**",
  "__pycache__/**"
]
max_upload_mb = 32

[outputs]
include = [
  "results/**",
  "artifacts/**"
]
max_output_mb = 64

[env]
PYTHONUNBUFFERED = "1"

[secrets]
FIREWORKS_API_KEY = "vault://local/fireworks_api_key"

[network]
egress = "allowlist"
allow = [
  "api.fireworks.ai"
]

[limits]
max_cost_usd = 1.00
max_retries = 1
